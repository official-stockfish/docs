name: Update Submodules

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-submodules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.UPDATE_TOKEN || github.token }}
          ref: master
          submodules: true
          fetch-depth: 0

      - name: Run update script
        run: ./update.sh

      - uses: actions/setup-node@v7
        with:
          node-version: latest
          cache: npm

      - name: Restore remote image cache
        uses: actions/cache/restore@v6
        with:
          path: public/images/external
          key: remote-images-${{ runner.os }}-${{ hashFiles('stockfish-wiki/**/*.md', 'fishtest-wiki/**/*.md', 'nnue-pytorch-wiki/**/*.md', 'index.md', 'README.md') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            remote-images-${{ runner.os }}-${{ hashFiles('stockfish-wiki/**/*.md', 'fishtest-wiki/**/*.md', 'nnue-pytorch-wiki/**/*.md', 'index.md', 'README.md') }}-
            remote-images-${{ runner.os }}-

      - run: npm ci

      - name: Fetch remote images
        run: npm run docs:build:fetch-images

      - name: Save remote image cache
        uses: actions/cache/save@v6
        with:
          path: public/images/external
          key: remote-images-${{ runner.os }}-${{ hashFiles('stockfish-wiki/**/*.md', 'fishtest-wiki/**/*.md', 'nnue-pytorch-wiki/**/*.md', 'index.md', 'README.md') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v10
        with:
          add: stockfish-wiki nnue-pytorch-wiki fishtest-wiki
          default_author: github_actions
          message: Update wiki submodules
          push: origin HEAD:master
