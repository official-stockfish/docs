name: Update Submodules

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-submodules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.UPDATE_TOKEN || github.token }}
          ref: master
          submodules: true
          fetch-depth: 0

      - name: Run update script
        run: ./update.sh

      - uses: actions/setup-node@v7
        with:
          node-version: latest
          cache: npm

      - run: npm ci

      - name: Fetch remote images
        run: npm run docs:build:fetch-images

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v10
        with:
          add: stockfish-wiki nnue-pytorch-wiki fishtest-wiki public/images/external
          default_author: github_actions
          message: Update wiki submodules
          push: origin HEAD:master
